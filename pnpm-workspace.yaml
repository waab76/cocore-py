packages:
  - "packages/*"
  - "infra/*"

overrides:
  # @atproto/pds pins better-sqlite3@10.x, whose native source predates
  # Node 24's C++20-only V8 headers and won't compile (no Node 24 prebuilt
  # exists either). Force the 11.x our own packages already use, which
  # builds cleanly from source on Node 24.
  better-sqlite3: "^11.10.0"

allowBuilds:
  better-sqlite3: true
  core-js: true
  protobufjs: true
  sharp: true
  esbuild: true

# Exclude `undici` from trust-downgrade enforcement: it's pulled
# transitively at 5.29.0 by `@connectrpc/connect-node`, which doesn't
# ship with provenance attestation at that version. Newer versions
# elsewhere in the graph (6.x via @types/node, 7.x via
# @atcute/oauth-node-client) are fine; the alarm is only on the older
# transitive. Tighten when connect-node upgrades undici.
trustPolicyExclude:
  - "undici"
  - "@noble/secp256k1"

